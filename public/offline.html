<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#18181b">
    <title>Magna Gestao Offline</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, Arial, sans-serif;
            background: radial-gradient(circle at top, #3f3f46, #09090b 70%);
            color: #fafafa;
        }

        main {
            width: min(100%, 420px);
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            background: rgba(24, 24, 27, 0.92);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.75rem;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #d4d4d8;
        }
    </style>
</head>
<body>
    <main>
        <h1>Sem conexao</h1>
        <p>A aplicacao nao conseguiu carregar esta tela agora. Assim que a internet voltar, atualize a pagina para continuar usando o sistema.</p>
    </main>
</body>
</html>
