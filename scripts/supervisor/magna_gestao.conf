[program:magna_gestao-queue]
process_name=%(program_name)s_%(process_num)02d
directory=/home/dionathan/magna_gestao_test
command=php /home/dionathan/magna_gestao_test/artisan queue:work database --queue=mail-receive,mail-process,mail-trip,default --sleep=3 --tries=3 --timeout=120
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/home/dionathan/magna_gestao_test/storage/logs/queue.log
stderr_logfile=/home/dionathan/magna_gestao_test/storage/logs/queue_error.log

[program:magna_gestao-schedule]
process_name=%(program_name)s
directory=/home/dionathan/magna_gestao_test
command=php /home/dionathan/magna_gestao_test/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/home/dionathan/magna_gestao_test/storage/logs/schedule.log
stderr_logfile=/home/dionathan/magna_gestao_test/storage/logs/schedule_error.log
